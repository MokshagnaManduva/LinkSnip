<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSnip — URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                LinkSnip
            </a>
            <div class="nav-links">
                <a href="/stats">Analytics Dashboard</a>
            </div>
        </nav>

        <main>
            <section class="hero">
                <h1>Shorten Your Links.</h1>
                <p>A lightning-fast, secure, and beautiful URL shortener with powerful click analytics. Enter a long URL to get started.</p>
            </section>

            <div class="glass-card">
                <div id="error-message" class="alert" style="display: none;"></div>

                <form id="shorten-form">
                    <div class="form-group">
                        <label for="original_url">Long URL</label>
                        <input type="url" id="original_url" name="original_url" class="form-control" placeholder="https://example.com/very-long-url-path" required>
                    </div>

                    <div class="form-group mb-4">
                        <button type="button" class="toggle-link" id="toggle-alias">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                            Add custom alias (optional)
                        </button>
                        <div id="alias-section" class="collapsible">
                            <div style="padding-top: 12px;">
                                <label for="custom_alias">Custom Alias</label>
                                <input type="text" id="custom_alias" name="custom_alias" class="form-control" placeholder="my-custom-link" pattern="[a-zA-Z0-9-]+" title="Letters, numbers, and hyphens only">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <span class="btn-text">Shorten URL ✂️</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <div id="result-box" class="result-box">
                    <label>Your Shortened URL is Ready!</label>
                    <div class="short-url-container">
                        <a href="#" id="short-url-link" target="_blank" class="short-url"></a>
                        <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            <span>Copy</span>
                        </button>
                    </div>
                    <div class="text-center">
                        <a href="#" id="stats-link" class="btn btn-outline" style="width: 100%;">View Analytics for this Link</a>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            &copy; 2026 LinkSnip. Built with Python and Flask.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('shorten-form');
            const submitBtn = document.getElementById('submit-btn');
            const toggleAliasBtn = document.getElementById('toggle-alias');
            const aliasSection = document.getElementById('alias-section');
            const resultBox = document.getElementById('result-box');
            const shortUrlLink = document.getElementById('short-url-link');
            const copyBtn = document.getElementById('copy-btn');
            const statsLink = document.getElementById('stats-link');
            const errorBox = document.getElementById('error-message');

            // Toggle custom alias section
            toggleAliasBtn.addEventListener('click', () => {
                aliasSection.classList.toggle('open');
                const svg = toggleAliasBtn.querySelector('svg');
                if (aliasSection.classList.contains('open')) {
                    svg.innerHTML = '<path d="M5 12h14"/>'; // Minus icon
                } else {
                    svg.innerHTML = '<path d="M12 5v14M5 12h14"/>'; // Plus icon
                    document.getElementById('custom_alias').value = '';
                }
            });

            // Handle form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Reset UI
                errorBox.style.display = 'none';
                resultBox.classList.remove('active');
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;

                const originalUrl = document.getElementById('original_url').value;
                const customAlias = document.getElementById('custom_alias').value;

                try {
                    const response = await fetch('/shorten', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            original_url: originalUrl,
                            custom_alias: customAlias
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Something went wrong');
                    }

                    // Success UI update
                    shortUrlLink.href = data.short_url;
                    shortUrlLink.textContent = data.short_url;
                    
                    // The stats page can take a short_id to highlight, or just go to general stats
                    // Currently we don't have a single item stats HTML page, but we can link to the general one
                    // or potentially anchor to it. Let's just link to /stats for now.
                    statsLink.href = '/stats';
                    
                    resultBox.classList.add('active');
                    form.reset();
                    if (aliasSection.classList.contains('open')) {
                        toggleAliasBtn.click(); // Close alias section
                    }
                    
                } catch (err) {
                    errorBox.textContent = err.message;
                    errorBox.classList.add('alert-error');
                    errorBox.style.display = 'block';
                } finally {
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            });

            // Handle copy button
            copyBtn.addEventListener('click', async () => {
                const url = shortUrlLink.textContent;
                try {
                    await navigator.clipboard.writeText(url);
                    
                    // Visual feedback
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><span>Copied!</span>';
                    copyBtn.classList.add('copied');
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy: ', err);
                }
            });
        });
    </script>
</body>
</html>
